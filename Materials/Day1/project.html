<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QuickShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">QuickShop</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="#">Home</a>
          <a class="nav-link" href="#">Products</a>
          <a class="nav-link" href="#">Cart <span class="badge bg-warning text-dark">3</span></a>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <div class="bg-primary text-white text-center py-5">
      <h1>Welcome to QuickShop</h1>
      <p class="lead">Find the best products at unbeatable prices</p>
      <a href="#products" class="btn btn-light btn-lg">Shop Now</a>
    </div>

    <!-- Products -->
    <div class="container my-5" id="products">
      <h2 class="mb-4">Featured Products</h2>
      <div class="row g-4">
        <!-- Repeat this card for each product -->
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://placehold.co/300x200" class="card-img-top" alt="Product" />
            <div class="card-body">
              <h5 class="card-title">T-Shirt</h5>
              <p class="card-text text-muted">Comfortable cotton t-shirt</p>
              <p class="fw-bold text-success fs-5">Rs. 20.00</p>
              <button class="btn btn-primary w-100" onclick="addtoCart()">Add to Cart</button>
            </div>
          </div>
        </div>
        <!-- Add 2 more cards here -->
         
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">© 2025 QuickShop. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Make "Add to Cart" buttons update the cart count in the navbar
      

    </script>
  </body>
</html>
