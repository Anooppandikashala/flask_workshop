{% extends "base.html" %}
{% block title %}Add Product — Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-4">Add New Product</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="name" class="form-control" required />
          </div>
          <div class="row">
            <div class="col mb-3">
              <label class="form-label">Price ($)</label>
              <input type="number" name="price" step="0.01" class="form-control" required />
            </div>
            <div class="col mb-3">
              <label class="form-label">Stock</label>
              <input type="number" name="stock" class="form-control" required />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" placeholder="clothing / footwear / accessories" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Image URL (optional)</label>
            <input type="text" name="image" class="form-control" placeholder="https://..." />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Add Product</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
